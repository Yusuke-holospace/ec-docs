<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C-20 404エラーページ（SP） - ワイヤーフレーム</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; color: #333; max-width: 390px; margin: 0 auto; }
    .header-top { background: #fff; border-bottom: 1px solid #eee; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .logo { width: 90px; height: 28px; background: #e8e8e8; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #999; }
    .header-top-right { display: flex; align-items: center; gap: 4px; }
    .header-top-right a { color: #666; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; min-width: 44px; min-height: 44px; justify-content: center; }
    .header-top-right .cart-link { position: relative; }
    .cart-badge-sp { position: absolute; top: 2px; right: 2px; background: #e53e3e; color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 50%; }
    .header-search { background: #fff; padding: 8px 16px; border-bottom: 1px solid #ddd; position: relative; }
    .header-search input { width: 100%; border: 1px solid #ddd; border-radius: 20px; padding: 10px 40px 10px 16px; font-size: 14px; height: 40px; }
    .header-search button { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #999; }

    /* ===== Drawer Menu ===== */
    .drawer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -80vw; width: 80vw; height: 100%; background: #fff; z-index: 201; transition: right 0.3s; overflow-y: auto; }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: flex-end; padding: 12px 16px; border-bottom: 1px solid #eee; }
    .drawer-close { background: none; border: none; cursor: pointer; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .drawer-accordion { border-bottom: 1px solid #eee; }
    .drawer-accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 44px; }
    .drawer-accordion-body { display: none; padding: 0 16px 12px; }
    .drawer-accordion.open .drawer-accordion-body { display: block; }
    .drawer-accordion-body a { display: block; padding: 10px 0; font-size: 13px; color: #333; text-decoration: none; border-bottom: 1px solid #f0f0f0; min-height: 44px; line-height: 24px; }
    .drawer-accordion-body a:last-child { border-bottom: none; }
    .drawer-link { display: block; padding: 14px 16px; font-size: 14px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; min-height: 44px; }
    .main { padding: 48px 16px; text-align: center; }
    .error-code { font-size: 56px; font-weight: bold; color: #ddd; margin-bottom: 12px; }
    .error-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .error-desc { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.7; }
    .error-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { display: block; background: #333; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; min-height: 48px; }
    .btn-outline { display: block; background: #fff; color: #333; border: 1px solid #333; border-radius: 8px; padding: 14px; font-size: 13px; cursor: pointer; text-decoration: none; text-align: center; min-height: 48px; }
    .footer { background: #333; color: #fff; padding: 24px 16px; margin-top: 48px; }
    .footer-section { margin-bottom: 20px; }
    .footer-section h4 { font-size: 13px; margin-bottom: 8px; }
    .footer-section a { display: block; color: #ccc; text-decoration: none; font-size: 12px; margin-bottom: 6px; }
    .footer-bottom { padding-top: 16px; border-top: 1px solid #555; text-align: center; font-size: 11px; color: #999; }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">ロゴ画像</div>
      <div class="header-top-right">
        <a href="#"><i data-lucide="log-in" style="width:22px;height:22px;"></i><span>ログイン</span></a>
        <a href="#" class="cart-link"><i data-lucide="shopping-cart" style="width:22px;height:22px;"></i><span>カート</span></a>
        <a href="#" onclick="openDrawer();return false;"><i data-lucide="menu" style="width:22px;height:22px;"></i><span>メニュー</span></a>
      </div>
    </div>
    <div class="header-search">
      <input type="text" placeholder="商品を検索...">
      <button><i data-lucide="search" style="width:16px;height:16px;"></i></button>
    </div>
  </header>
  <div class="main">
    <div class="error-code">404</div>
    <div class="error-title">ページが見つかりません</div>
    <div class="error-desc">お探しのページは存在しないか、<br>移動した可能性があります。</div>
    <div class="error-actions">
      <a href="#" class="btn-primary">トップページへ</a>
      <a href="#" class="btn-outline">商品一覧へ</a>
    </div>
  </div>
  <footer class="footer">
    <div class="footer-section"><div style="width:180px;height:54px;background:#555;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#999;">ロゴ画像</div></div>
    <div class="footer-section"><h4>サポート</h4><a href="#">FAQ</a><a href="#">ご利用ガイド</a><a href="#">お問い合わせ</a></div>
    <div class="footer-section"><h4>サイト情報</h4><a href="#">運営会社</a><a href="#">特定商取引法に基づく表記</a><a href="#">利用規約</a><a href="#">プライバシーポリシー</a></div>
    <div class="footer-bottom">&copy; 2026 Company Name. All rights reserved.</div>
  </footer>

  <!-- ===== DRAWER MENU ===== -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <button class="drawer-close" onclick="closeDrawer()"><i data-lucide="x" style="width:24px;height:24px;color:#333;"></i></button>
    </div>
    <div class="drawer-accordion" id="categoryAccordion">
      <div class="drawer-accordion-header" onclick="toggleAccordion()">
        <span style="display:flex;align-items:center;gap:10px;"><i data-lucide="grid-2x2" style="width:18px;height:18px;color:#666;"></i>カテゴリ一覧</span>
        <i data-lucide="chevron-down" style="width:18px;height:18px;color:#999;"></i>
      </div>
      <div class="drawer-accordion-body">
        <a href="#">缶バッジ</a><a href="#">アクリルスタンド</a><a href="#">キーホルダー</a><a href="#">ストラップ</a><a href="#">トレーディングカード</a><a href="#">クリアファイル</a><a href="#">ステッカー・シール</a><a href="#">タオル・布製品</a><a href="#">Tシャツ</a><a href="#">トートバッグ</a><a href="#">うちわ</a><a href="#">その他グッズ</a>
      </div>
    </div>
    <a class="drawer-link" href="#" style="display:flex;align-items:center;gap:10px;"><i data-lucide="book-open" style="width:18px;height:18px;color:#666;"></i>ご利用ガイド</a>
    <a class="drawer-link" href="#" style="display:flex;align-items:center;gap:10px;"><i data-lucide="help-circle" style="width:18px;height:18px;color:#666;"></i>FAQ</a>
    <a class="drawer-link" href="#" style="display:flex;align-items:center;gap:10px;"><i data-lucide="file-text" style="width:18px;height:18px;color:#666;"></i>入稿について</a>
    <a class="drawer-link" href="#" style="display:flex;align-items:center;gap:10px;"><i data-lucide="log-in" style="width:18px;height:18px;color:#666;"></i>ログイン</a>
  </div>

  <script>
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }
    function toggleAccordion() {
      document.getElementById('categoryAccordion').classList.toggle('open');
    }
    lucide.createIcons();
  </script>
</body>
</html>
