<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C-11 会員情報編集（SP） - ワイヤーフレーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; color: #333; max-width: 390px; margin: 0 auto; }
    .header-top { background: #fff; border-bottom: 1px solid #eee; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 18px; font-weight: bold; }
    .header-top-right { display: flex; align-items: center; gap: 4px; }
    .header-top-right a { color: #666; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; min-width: 44px; min-height: 44px; justify-content: center; }
    .header-top-right .nav-icon { width: 22px; height: 22px; background: #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 8px; }
    .header-search { background: #fff; padding: 8px 16px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; }
    .header-search input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 8px 12px; font-size: 14px; }
    .header-search button { background: #333; color: #fff; border: none; border-radius: 4px; padding: 8px 14px; font-size: 14px; cursor: pointer; }
    .tab-nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-nav a { flex-shrink: 0; padding: 12px 16px; font-size: 13px; font-weight: bold; color: #999; text-decoration: none; border-bottom: 2px solid transparent; min-height: 44px; display: flex; align-items: center; }
    .tab-nav a.active { color: #333; border-bottom-color: #333; }
    .page-title { font-size: 18px; font-weight: bold; padding: 16px; }
    .form-section { background: #fff; padding: 16px; margin-bottom: 8px; }
    .form-section-title { font-size: 15px; font-weight: bold; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .form-label .required { color: #e53e3e; font-size: 11px; font-weight: normal; }
    .form-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-height: 44px; }
    .postal-btn { padding: 10px 14px; background: #f8f8f8; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; min-height: 44px; }
    .actions { padding: 16px; background: #fff; margin-top: 8px; }
    .btn-primary { display: block; width: 100%; background: #333; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; min-height: 48px; }
    .form-error { font-size: 11px; color: #e53e3e; margin-top: 4px; }
    .form-input.error { border-color: #e53e3e; }
    .save-msg { text-align: center; padding: 12px; background: #e8f5e9; border-radius: 6px; margin: 0 16px 8px; font-size: 13px; color: #2e7d32; display: none; }
    .footer { background: #333; color: #fff; padding: 24px 16px; margin-top: 0; }
    .footer-section { margin-bottom: 20px; }
    .footer-section h4 { font-size: 13px; margin-bottom: 8px; }
    .footer-section a { display: block; color: #ccc; text-decoration: none; font-size: 12px; margin-bottom: 6px; }
    .footer-bottom { padding-top: 16px; border-top: 1px solid #555; text-align: center; font-size: 11px; color: #999; }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div class="logo">LOGO</div>
      <div class="header-top-right">
        <a href="#"><span class="nav-icon">icon</span>マイページ</a>
        <a href="#"><span class="nav-icon">icon</span>カート</a>
        <a href="#"><span class="nav-icon">icon</span>メニュー</a>
      </div>
    </div>
    <div class="header-search"><input type="text" placeholder="商品名・キーワード"><button>検索</button></div>
  </header>

  <div style="background:#fff;padding:12px 16px;border-bottom:1px solid #eee;"><a href="#" style="font-size:13px;color:#1a73e8;text-decoration:none;min-height:44px;display:inline-flex;align-items:center;">マイページに戻る</a></div>

  <div class="page-title">会員情報</div>
  <div class="save-msg" id="saveMsg">保存しました</div>

  <!-- ===== 会社情報（表示モード例） ===== -->
  <div class="form-section">
    <div class="form-section-title" style="display:flex;justify-content:space-between;align-items:center;">会社情報 <a href="#" style="font-size:12px;color:#1a73e8;text-decoration:underline;font-weight:normal;min-height:44px;display:flex;align-items:center;">編集</a></div>
    <table style="width:100%;font-size:13px;">
      <tr style="border-bottom:1px solid #eee;"><td style="padding:10px 0;color:#666;width:100px;">会社名</td><td style="padding:10px 0;">株式会社ホロスペース</td></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:10px 0;color:#666;">担当者名</td><td style="padding:10px 0;">鬼柳 裕介</td></tr>
      <tr><td style="padding:10px 0;color:#666;">電話番号</td><td style="padding:10px 0;">03-1234-5678</td></tr>
    </table>
  </div>

  <!-- ===== 住所（編集モード例） ===== -->
  <div class="form-section">
    <div class="form-section-title">住所（配送先）</div>
    <div class="form-group">
      <div class="form-label">郵便番号 <span class="required">必須</span></div>
      <div style="display:flex;gap:8px;"><input class="form-input" type="text" value="150-0001" style="max-width:90px;"><button class="postal-btn">住所検索</button></div>
    </div>
    <div class="form-group"><div class="form-label">都道府県 <span class="required">必須</span></div><select class="form-input"><option selected>東京都</option></select></div>
    <div class="form-group"><div class="form-label">市区町村・番地 <span class="required">必須</span></div><input class="form-input" type="text" value="渋谷区神宮前1-2-3"></div>
    <div class="form-group"><div class="form-label">建物名・部屋番号</div><input class="form-input" type="text" value="ABCビル 5F"></div>
    <div class="actions" style="margin-top:16px;">
      <button class="btn-primary">変更を保存</button>
      <a href="#" style="display:block;text-align:center;margin-top:10px;font-size:13px;color:#999;text-decoration:underline;min-height:44px;line-height:44px;">キャンセル</a>
    </div>
  </div>

  <!-- ===== アカウント（表示のみ） ===== -->
  <div class="form-section">
    <div class="form-section-title">アカウント</div>
    <table style="width:100%;font-size:13px;">
      <tr><td style="padding:10px 0;color:#666;width:100px;">メール</td><td style="padding:10px 0;">yusuke@holospace.jp<div style="font-size:11px;color:#999;margin-top:2px;">Googleアカウントでログイン中</div></td></tr>
    </table>
  </div>

  <footer class="footer">
    <div class="footer-section"><h4>商品カテゴリ</h4><a href="#">缶バッジ</a><a href="#">アクリルスタンド</a><a href="#">キーホルダー</a></div>
    <div class="footer-section"><h4>サポート</h4><a href="#">FAQ</a><a href="#">ご利用ガイド</a><a href="#">お問い合わせ</a></div>
    <div class="footer-section"><h4>法的情報</h4><a href="#">利用規約</a><a href="#">プライバシーポリシー</a><a href="#">特商法表記</a></div>
    <div class="footer-bottom">&copy; 2026 Company Name.</div>
  </footer>

</body>
</html>
